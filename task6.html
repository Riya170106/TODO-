<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beautiful Todo App</title>
<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-500 via-pink-500 to-red-500 flex items-center justify-center min-h-screen">
<div class="bg-white w-96 p-6 rounded-2xl shadow-2xl">
<h2 class="text-3xl font-bold text-center text-gray-700 mb-5">
✨ My Todo App
</h2>
<div class="flex gap-2 mb-4">
<input type="text" id="task" 
placeholder="Enter your task..."
class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
/>
<button onclick="addTask()" 
class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition duration-300 shadow-md"
>
Add</button>
</div>
<ul id="list" class="space-y-3"></ul>
</div>
<script>
function addTask(){
let task = document.getElementById("task").value
if(task === "") return
let li = document.createElement("li")
li.className = "flex justify-between items-center bg-gray-100 px-4 py-2 rounded-lg shadow hover:scale-105 transition"
li.innerText = task
let btn = document.createElement("button")
btn.innerText = "❌"
btn.className = "text-red-500 font-bold hover:text-red-700"
btn.onclick = function(){
    li.remove()
}
li.appendChild(btn)
document.getElementById("list").appendChild(li)
document.getElementById("task").value = ""
}
</script>
</body>
</html>
