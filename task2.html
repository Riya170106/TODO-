<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Color Changer</h2>

    <button class="color-btn">Red</button>
    <button class="color-btn">Green</button>
    <button class="color-btn">Blue</button>
</body>

<script>
    const buttons = document.querySelectorAll(".color-btn")
    //all tag which are using same class makes a list of them
    buttons.forEach(function (btn) {
        btn.addEventListener("click", function (event) {
         //function(event) means the event which is triggered will perform action
            const color = event.target.innerText.toLowercase()
            //toLowercase is use because in css it is best to grite color in lower case
            //it will run without toLowercase also
            document.body.style.backgroundColor = color

        })
    }) 
</script>
</html>
